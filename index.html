<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imran | Project Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050206;
            --accent: #ec4899;
            --card-bg: #0f0a0d;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; padding: 40px; margin: 0; }
        .header { text-align: center; margin-bottom: 60px; }
        .header h1 { font-family: 'Orbitron', sans-serif; color: var(--accent); font-size: 3rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        
        .card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            padding: 30px; 
            border-radius: 15px; 
            text-decoration: none; 
            color: white; 
            transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .card h2 { color: var(--accent); margin-top: 0; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PROJECT HUB</h1>
        <p>Central access to all active deployments.</p>
    </div>

    <div class="grid">
        <a href="https://imran23221.github.io/Sentron-Smash/" class="card">
            <h2>Sentron Smash</h2>
            <p>Main game engine deployment.</p>
        </a>
        <a href="https://imran23221.github.io/Sentron-Survival/" class="card">
            <h2>Sentron Survival</h2>
            <p>Core survival module simulation.</p>
        </a>
        <a href="https://imran23221.github.io/Sentron-Survival-Mobile/" class="card">
            <h2>Sentron Survival Mobile</h2>
            <p>Optimized mobile build.</p>
        </a>
    </div>

</body>
</html>
