<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imran's Core Hub</title>
    <style>
        :root {
            --bg: #050206;
            --accent: #ec4899;
            --card-bg: rgba(18, 10, 22, 0.8);
            --text: #ffffff;
        }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            padding: 50px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hub-title { 
            font-size: 3rem; 
            margin-bottom: 50px; 
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
        }
        .project-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            width: 100%;
            max-width: 1000px;
        }
        .project-card { 
            background: var(--card-bg); 
            border: 1px solid var(--accent); 
            padding: 30px; 
            border-radius: 15px; 
            text-decoration: none; 
            color: var(--text);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }
        .project-card:hover { 
            transform: scale(1.05); 
            background: #25121e;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.3);
        }
        .project-card h3 { 
            color: var(--accent); 
            font-size: 1.5rem; 
            margin-top: 0; 
        }
    </style>
</head>
<body>
    <h1 class="hub-title">CORE SYSTEM HUB</h1>
    
    <div class="project-grid">
        <a href="https://imran23221.github.io/sentron-smash/" class="project-card">
            <h3>Sentron Smash</h3>
            <p>Access the main game engine dashboard.</p>
        </a>
        <a href="https://imran23221.github.io/sentron-survival/" class="project-card">
            <h3>Sentron Survival</h3>
            <p>Core survival module simulation.</p>
        </a>
        <a href="https://imran23221.github.io/sentron-survival-mobile/" class="project-card">
            <h3>Sentron Survival Mobile</h3>
            <p>Mobile-optimized survival build.</p>
        </a>
    </div>
</body>
</html>
