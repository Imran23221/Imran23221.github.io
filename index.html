<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imran's Core Hub</title>
    <style>
        body { 
            background-color: #050206; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            padding: 40px; 
            margin: 0;
        }
        .hub-title { 
            font-size: 2.5rem; 
            margin-bottom: 40px; 
            border-bottom: 2px solid #ec4899; 
            padding-bottom: 10px; 
            color: #ffffff;
        }
        .project-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        .project-card { 
            background: rgba(18, 10, 22, 0.8); 
            border: 1px solid #ec4899; 
            padding: 20px; 
            border-radius: 12px; 
            text-decoration: none; 
            color: white;
            transition: transform 0.2s, background 0.2s;
        }
        .project-card:hover { 
            transform: translateY(-5px); 
            background: #1a0f1e; 
        }
        .project-card h3 { 
            color: #ec4899; 
            margin-top: 0; 
        }
    </style>
</head>
<body>
    <h1 class="hub-title">CORE SYSTEM HUB</h1>
    
    <div class="project-grid">
        <a href="#" class="project-card">
            <h3>Sentron Smash</h3>
            <p>Main game project.</p>
        </a>
        <a href="#" class="project-card">
            <h3>Sentron Survival</h3>
            <p>Core survival module.</p>
        </a>
        <a href="#" class="project-card">
            <h3>Sentron Survival Mobile</h3>
            <p>Mobile optimization build.</p>
        </a>
    </div>
</body>
</html>
